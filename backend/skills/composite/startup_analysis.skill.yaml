# =============================================================================
# 启动分析 v2.2（组合 Skill）- 基于 Perfetto stdlib 优化版
# =============================================================================
# 使用 Perfetto stdlib 的 android_startups 系列表和函数
# 充分利用多表 JOIN 获取深度分析数据
#
# v2.2 新增：
# - Iterator 模式：逐个启动事件详细分析
# - 大小核分析：启动期间 CPU 大小核占比
# - 四大象限分析：Running/Runnable/Sleeping 状态分布
# - Perfetto 跳转链接：点击跳转到启动区间
#
# 核心表：
# - android_startups: 启动事件基础信息
# - android_startup_processes: 启动进程信息，包含 startup_type
# - android_startup_threads: 启动线程信息，包含 is_main_thread
# - android_thread_slices_for_all_startups: 启动期间所有 slice
# - android_startup_opinionated_breakdown: 启动延迟归因分析
# - android_startup_time_to_display: TTID/TTFD 指标
#
# 核心函数：
# - android_sum_dur_for_startup_and_slice(startup_id, slice_name)
# - android_sum_dur_on_main_thread_for_startup_and_slice(startup_id, slice_name)
# - android_binder_transaction_slices_for_startup(startup_id, threshold)

name: startup_analysis
version: "1.0"
type: composite
category: app_lifecycle
tier: S

meta:
  display_name: "应用启动分析"
  description: "全方位的应用启动性能分析"
  icon: "rocket"
  tags: [startup, app, composite]

triggers:
  keywords:
    zh: [启动, 冷启动, 热启动, 温启动, 启动时间, 启动慢, 启动优化]
    en: [startup, launch, cold start, warm start, hot start, app launch]
  patterns:
    - ".*启动.*时间.*"
    - ".*启动.*慢.*"
    - ".*launch.*"

prerequisites:
  modules:
    - android.startup.startups
    - android.startup.time_to_display
    - android.startup.startup_breakdowns
    - android.binder

inputs:
  - name: package
    type: string
    required: false
    description: "应用包名（可选，不填则分析所有启动事件）"
  - name: startup_id
    type: integer
    required: false
    description: "指定启动事件 ID（可选）"
  - name: startup_type
    type: string
    required: false
    description: "启动类型过滤（cold/warm/hot，可选）"
  - name: start_ts
    type: timestamp
    required: false
    description: "启动区间开始时间戳（ns，可选）"
  - name: end_ts
    type: timestamp
    required: false
    description: "启动区间结束时间戳（ns，可选）"
  - name: analysis_mode
    type: string
    required: false
    description: "分析模式：full（默认）或 overview（仅启动事件定位）"
  - name: enable_startup_details
    type: boolean
    required: false
    description: "是否执行逐个启动事件详情分析（默认 true）"

identity:
  policy: verify_if_present
  scope: process
  aliases: [package, process_name]
  rewriteTo: recommended_process_name_param

steps:
  # ========== 获取启动事件概览 ==========
  - id: get_startups
    type: skill
    name: "获取启动事件"
    skill: startup_events_in_range
    synthesize:
      role: overview
      fields:
        - key: startup_type
          label: 启动类型
        - key: dur_ms
          label: 启动耗时
          format: "{{value}} ms"
        - key: ttid_ms
          label: TTID
          format: "{{value}} ms"
        - key: rating
          label: 评级
      insights:
        - condition: "dur_ms > 2000 && startup_type === 'cold'"
          template: "冷启动耗时 {{dur_ms}}ms，超过 2s 需要优化"
        - condition: "dur_ms > 1000 && dur_ms <= 2000 && startup_type === 'cold'"
          template: "冷启动耗时 {{dur_ms}}ms，超过 1s 建议优化"
        - condition: "dur_ms > 1000 && startup_type === 'warm'"
          template: "温启动耗时 {{dur_ms}}ms，超过 1s 建议优化"
    display:
      level: key
      layer: overview
      title: "检测到的启动事件"
      columns:
        - name: startup_id
          label: "启动 ID"
          type: number
        - name: package
          label: "包名"
          type: string
        - name: type_display
          label: "启动类型"
          type: string
        - name: startup_type
          label: "修正后类型"
          type: string
          hidden: true
        - name: original_type
          label: "原始类型"
          type: string
          hidden: true
        - name: type_reclassified
          label: "类型已修正"
          type: number
          hidden: true
        - name: type_confidence
          label: "类型置信度"
          type: string
          hidden: true
        - name: dur_ms
          label: "耗时"
          type: duration
          format: duration_ms
          unit: ms
          hidden: true
        - name: start_ts
          label: "开始时间"
          type: timestamp
          unit: ns
          clickAction: navigate_range
          durationColumn: dur_ns
        - name: end_ts
          label: "结束时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: dur_ns
          label: "耗时"
          type: duration
          format: duration_ms
          unit: ns
        - name: ttid_ms
          label: "TTID"
          type: duration
          format: duration_ms
          unit: ms
        - name: ttfd_ms
          label: "TTFD"
          type: duration
          format: duration_ms
          unit: ms
        - name: rating
          label: "评级"
          type: string
    params:
      package: "${package}"
      startup_id: "${startup_id}"
      startup_type: "${startup_type}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    save_as: startups
    on_empty: "未检测到启动事件。请确认 Trace 包含应用启动数据。"

  # ========== 启动数据质量门禁 ==========
  - id: startup_quality
    type: atomic
    name: "启动数据质量门禁"
    display:
      level: key
      layer: overview
      title: "启动数据质量"
      columns:
        - name: sample_count
          label: "样本数"
          type: number
        - name: blocker_count
          label: "阻断问题"
          type: number
        - name: warning_count
          label: "告警问题"
          type: number
        - name: quality_status
          label: "门禁状态"
          type: string
        - name: issue_codes
          label: "问题编码"
          type: string
        - name: quality_summary
          label: "说明"
          type: string
    sql: |
      WITH filtered AS (
        SELECT
          s.startup_id,
          s.startup_type,
          s.package,
          s.ts,
          s.dur,
          s.dur / 1e6 as dur_ms,
          CASE
            WHEN ttd.time_to_initial_display IS NULL OR ttd.time_to_initial_display <= 0 THEN NULL
            ELSE ttd.time_to_initial_display / 1e6
          END as ttid_ms,
          CASE
            WHEN ttd.time_to_full_display IS NULL OR ttd.time_to_full_display <= 0 THEN NULL
            ELSE ttd.time_to_full_display / 1e6
          END as ttfd_ms
        FROM android_startups s
        LEFT JOIN android_startup_time_to_display ttd USING (startup_id)
        WHERE (s.package GLOB '${package}*' OR '${package}' = '')
          AND (${startup_id} IS NULL OR s.startup_id = ${startup_id})
          AND (${start_ts} IS NULL OR s.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR s.ts + s.dur <= ${end_ts})
      ),
      -- Detect key slices to validate startup_type classification.
      -- Uses android_startup_threads (stdlib) + direct slice JOIN with OVERLAP
      -- time filter. bindApplication can start before the startup window.
      startup_type_signals AS (
        SELECT
          st.startup_id,
          MAX(CASE WHEN sl.name = 'bindApplication' THEN 1 ELSE 0 END) as has_bind_app,
          MAX(CASE WHEN sl.name GLOB 'performCreate:*' THEN 1 ELSE 0 END) as has_perform_create,
          MAX(CASE WHEN sl.name GLOB 'handleRelaunchActivity*'
                   OR sl.name GLOB 'relaunchActivity*' THEN 1 ELSE 0 END) as has_relaunch
        FROM android_startup_threads st
        JOIN thread_track tt ON tt.utid = st.utid
        JOIN slice sl ON sl.track_id = tt.id
        WHERE st.is_main_thread = 1
          AND st.startup_id IN (SELECT startup_id FROM filtered)
          AND sl.ts + sl.dur > st.ts AND sl.ts < st.ts + st.dur
          AND (sl.name = 'bindApplication' OR sl.name GLOB 'performCreate:*'
               OR sl.name GLOB 'handleRelaunchActivity*' OR sl.name GLOB 'relaunchActivity*')
        GROUP BY st.startup_id
      ),
      flags AS (
        SELECT
          f.startup_id,
          CASE WHEN f.dur <= 0 THEN 1 ELSE 0 END as b_invalid_duration,
          CASE WHEN f.dur_ms >= 200 AND f.ttid_ms IS NOT NULL AND f.ttid_ms < 10 THEN 1 ELSE 0 END as w_ttid_small,
          CASE WHEN f.dur_ms >= 200 AND f.ttfd_ms IS NOT NULL AND f.ttfd_ms < 10 THEN 1 ELSE 0 END as w_ttfd_small,
          CASE WHEN f.ttid_ms IS NOT NULL AND f.ttid_ms > f.dur_ms + 50 THEN 1 ELSE 0 END as w_ttid_gt_dur,
          CASE WHEN f.ttfd_ms IS NOT NULL AND f.ttfd_ms > f.dur_ms + 50 THEN 1 ELSE 0 END as w_ttfd_gt_dur,
          CASE WHEN f.ttid_ms IS NOT NULL AND f.ttfd_ms IS NOT NULL AND f.ttfd_ms < f.ttid_ms THEN 1 ELSE 0 END as w_ttfd_lt_ttid,
          CASE
            WHEN COALESCE(sts.has_bind_app, 0) = 1 AND f.startup_type != 'cold' THEN 1
            WHEN COALESCE(sts.has_perform_create, 0) = 1 AND COALESCE(sts.has_bind_app, 0) = 0 AND f.startup_type != 'warm' THEN 1
            WHEN COALESCE(sts.has_relaunch, 0) = 1 AND f.startup_type != 'warm' THEN 1
            ELSE 0
          END as w_type_reclassified
        FROM filtered f
        LEFT JOIN startup_type_signals sts USING (startup_id)
      ),
      agg AS (
        SELECT
          COUNT(*) as sample_count,
          COALESCE(SUM(b_invalid_duration), 0) as blocker_count,
          COALESCE(SUM(w_ttid_small), 0) +
            COALESCE(SUM(w_ttfd_small), 0) +
            COALESCE(SUM(w_ttid_gt_dur), 0) +
            COALESCE(SUM(w_ttfd_gt_dur), 0) +
            COALESCE(SUM(w_ttfd_lt_ttid), 0) +
            COALESCE(SUM(w_type_reclassified), 0) as warning_count,
          MAX(CASE WHEN b_invalid_duration = 1 THEN 1 ELSE 0 END) as has_invalid_duration,
          MAX(CASE WHEN w_ttid_small = 1 THEN 1 ELSE 0 END) as has_ttid_small,
          MAX(CASE WHEN w_ttfd_small = 1 THEN 1 ELSE 0 END) as has_ttfd_small,
          MAX(CASE WHEN w_ttid_gt_dur = 1 THEN 1 ELSE 0 END) as has_ttid_gt_dur,
          MAX(CASE WHEN w_ttfd_gt_dur = 1 THEN 1 ELSE 0 END) as has_ttfd_gt_dur,
          MAX(CASE WHEN w_ttfd_lt_ttid = 1 THEN 1 ELSE 0 END) as has_ttfd_lt_ttid,
          MAX(CASE WHEN w_type_reclassified = 1 THEN 1 ELSE 0 END) as has_type_reclassified
        FROM flags
      )
      SELECT
        sample_count,
        blocker_count,
        warning_count,
        CASE
          WHEN blocker_count > 0 THEN 'BLOCKER'
          WHEN warning_count > 0 THEN 'WARN'
          ELSE 'PASS'
        END as quality_status,
        TRIM(
          (CASE WHEN has_invalid_duration = 1 THEN 'R001_INVALID_DURATION,' ELSE '' END) ||
          (CASE WHEN has_ttid_small = 1 THEN 'R008_TTID_SUSPICIOUSLY_SMALL,' ELSE '' END) ||
          (CASE WHEN has_ttfd_small = 1 THEN 'R008_TTFD_SUSPICIOUSLY_SMALL,' ELSE '' END) ||
          (CASE WHEN has_ttid_gt_dur = 1 THEN 'R008_TTID_GT_DUR,' ELSE '' END) ||
          (CASE WHEN has_ttfd_gt_dur = 1 THEN 'R008_TTFD_GT_DUR,' ELSE '' END) ||
          (CASE WHEN has_ttfd_lt_ttid = 1 THEN 'R008_TTFD_LT_TTID,' ELSE '' END) ||
          (CASE WHEN has_type_reclassified = 1 THEN 'R009_TYPE_RECLASSIFIED,' ELSE '' END),
          ','
        ) as issue_codes,
        CASE
          WHEN blocker_count > 0 THEN '检测到阻断级数据问题，已停止启动深挖'
          WHEN has_type_reclassified = 1 AND warning_count = 1 THEN '启动类型已修正（基于 bindApplication/performCreate 存在性校验，原始分类不一致），评级已按修正后类型计算'
          WHEN warning_count > 0 THEN '检测到可疑指标，结论需谨慎解读'
          ELSE '数据质量通过，允许进入深度分析'
        END as quality_summary
      FROM agg
    save_as: startup_quality
    condition: startups.data.length > 0

  # ========== 启动延迟归因分析（使用 opinionated_breakdown）==========
  - id: startup_breakdown
    type: skill
    name: "启动延迟归因"
    skill: startup_breakdown_in_range
    synthesize:
      role: list
      groupBy:
        - field: category
          title: 延迟类别分布
      fields:
        - key: reason
          label: 延迟原因
        - key: total_dur_ms
          label: 总耗时
          format: "{{value}} ms ({{percent}}%)"
    display:
      level: key
      layer: overview
      title: "启动延迟归因分析"
      columns:
        - name: reason
          label: "延迟原因"
          type: string
        - name: count
          label: "次数"
          type: number
          format: compact
        - name: total_dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: avg_dur_ms
          label: "平均耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: max_dur_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: percent
          label: "占比"
          type: percentage
          format: percentage
        - name: category
          label: "类别"
          type: string
    params:
      package: "${package}"
      startup_id: "${startup_id}"
      startup_type: "${startup_type}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
      top_k: 15
    save_as: breakdown
    condition: startups.data.length > 0 && '${analysis_mode|full}' !== 'overview' && ((startup_quality?.data?.[0]?.blocker_count || 0) === 0)

  # ========== 主线程关键 Slice 分析 ==========
  - id: main_thread_slices
    type: skill
    name: "主线程关键操作"
    skill: startup_main_thread_slices_in_range
    synthesize:
      role: list
      groupBy:
        - field: startup_type
          title: 按启动类型分布
      fields:
        - key: slice_name
          label: 操作名称
        - key: total_dur_ms
          label: 总耗时
          format: "{{value}} ms"
        - key: percent_of_startup
          label: 占比
          format: "{{value}}%"
    display:
      level: key
      layer: overview
      title: "主线程耗时操作 Top15"
      columns:
        - name: slice_name
          label: "操作名称"
          type: string
        - name: thread_name
          label: "线程"
          type: string
        - name: count
          label: "次数"
          type: number
          format: compact
        - name: total_dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: avg_dur_ms
          label: "平均耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: max_dur_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: percent_of_startup
          label: "启动占比"
          type: percentage
          format: percentage
        - name: startup_type
          label: "启动类型"
          type: string
    params:
      package: "${package}"
      startup_id: "${startup_id}"
      startup_type: "${startup_type}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
      min_dur_ns: 1000000
      top_k: 15
    save_as: main_thread_slices
    condition: startups.data.length > 0 && '${analysis_mode|full}' !== 'overview' && ((startup_quality?.data?.[0]?.blocker_count || 0) === 0)

  # ========== 启动期间主线程文件 IO ==========
  - id: main_thread_file_io
    type: skill
    name: "主线程文件 IO"
    skill: startup_main_thread_file_io_in_range
    synthesize:
      role: list
      groupBy:
        - field: startup_type
          title: 按启动类型分布
      fields:
        - key: io_slice
          label: IO 操作
        - key: total_dur_ms
          label: 总耗时
          format: "{{value}} ms"
        - key: percent_of_startup
          label: 占比
          format: "{{value}}%"
    display:
      level: key
      layer: overview
      title: "主线程文件 IO Top15"
      columns:
        - name: io_slice
          label: "IO 操作"
          type: string
        - name: thread_name
          label: "线程"
          type: string
        - name: count
          label: "次数"
          type: number
          format: compact
        - name: total_dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: avg_dur_ms
          label: "平均耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: max_dur_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: percent_of_startup
          label: "启动占比"
          type: percentage
          format: percentage
        - name: startup_type
          label: "启动类型"
          type: string
    params:
      package: "${package}"
      startup_id: "${startup_id}"
      startup_type: "${startup_type}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
      min_dur_ns: 500000
      top_k: 15
    save_as: main_thread_file_io
    condition: startups.data.length > 0 && '${analysis_mode|full}' !== 'overview' && ((startup_quality?.data?.[0]?.blocker_count || 0) === 0)

  # ========== 启动期间 Binder 调用分析（多表 JOIN）==========
  - id: startup_binder
    type: skill
    name: "启动期间 Binder 调用"
    skill: startup_binder_in_range
    synthesize:
      role: list
      groupBy:
        - field: server_process
          title: 按服务进程分布
      fields:
        - key: aidl_name
          label: AIDL 方法
        - key: total_dur_ms
          label: 总耗时
          format: "{{value}} ms"
        - key: call_count
          label: 调用次数
      insights:
        - condition: "percent_of_startup > 20"
          template: "Binder 调用占启动时间 {{percent_of_startup}}%，需优化"
    display:
      level: key
      layer: overview
      title: "启动期间 Binder 调用"
      columns:
        - name: server_process
          label: "服务进程"
          type: string
        - name: aidl_name
          label: "AIDL 方法"
          type: string
        - name: call_count
          label: "调用次数"
          type: number
          format: compact
        - name: total_dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: avg_dur_ms
          label: "平均耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: max_dur_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: main_thread_calls
          label: "主线程调用"
          type: number
        - name: percent_of_startup
          label: "启动占比"
          type: percentage
          format: percentage
    params:
      package: "${package}"
      startup_id: "${startup_id}"
      startup_type: "${startup_type}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
      top_k: 15
    save_as: startup_binder
    condition: startups.data.length > 0 && '${analysis_mode|full}' !== 'overview' && ((startup_quality?.data?.[0]?.blocker_count || 0) === 0)

  # ========== 启动期间主线程同步 Binder 调用 ==========
  - id: main_thread_sync_binder
    type: skill
    name: "主线程同步 Binder 调用"
    skill: startup_main_thread_sync_binder_in_range
    display:
      level: key
      layer: overview
      title: "主线程同步 Binder 调用"
      columns:
        - name: server_process
          label: "服务进程"
          type: string
        - name: aidl_name
          label: "AIDL 方法"
          type: string
        - name: call_count
          label: "调用次数"
          type: number
          format: compact
        - name: total_dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: avg_dur_ms
          label: "平均耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: max_dur_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: percent_of_startup
          label: "启动占比"
          type: percentage
          format: percentage
    params:
      package: "${package}"
      startup_id: "${startup_id}"
      startup_type: "${startup_type}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
      top_k: 15
    save_as: main_sync_binder
    condition: startups.data.length > 0 && '${analysis_mode|full}' !== 'overview' && ((startup_quality?.data?.[0]?.blocker_count || 0) === 0)

  # ========== 主线程 Binder 阻塞分析（深度 JOIN）==========
  - id: main_thread_binder_blocking
    type: skill
    name: "主线程 Binder 阻塞"
    skill: startup_main_thread_binder_blocking_in_range
    display:
      level: detail
      layer: list
      title: "主线程 Binder 阻塞分析"
      columns:
        - name: server_process
          label: "服务进程"
          type: string
        - name: aidl_name
          label: "AIDL 方法"
          type: string
        - name: dur_ms
          label: "耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: state
          label: "阻塞状态"
          type: string
        - name: blocked_function
          label: "阻塞函数"
          type: string
          format: code
        - name: ts_str
          label: "时间戳"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: severity
          label: "严重程度"
          type: enum
    params:
      package: "${package}"
      startup_id: "${startup_id}"
      startup_type: "${startup_type}"
      start_ts: "${start_ts}"
